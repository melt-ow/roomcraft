<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROOMCRAFT - 3Dバーチャル内見</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #2D5BFF;
      --primary-hover: #1a45e0;
      --accent: #FF6B35;
      --dark: #1a1a2e;
      --card: #222244;
      --card-border: rgba(255,255,255,0.08);
      --text: #e0e0f0;
      --text-dim: rgba(255,255,255,0.4);
      --success: #28C840;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #000;
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }

    /* ===== UPLOAD SCREEN ===== */
    .screen { display: none; height: 100vh; }
    .screen.active { display: flex; }

    .upload-screen {
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      align-items: center;
      justify-content: center;
    }

    .upload-container {
      width: 100%;
      max-width: 520px;
      padding: 2rem;
    }

    .upload-logo {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-align: center;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff, #a8c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .upload-tagline {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
    }

    .upload-dropzone {
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .upload-dropzone:hover { border-color: var(--primary); background: rgba(45,91,255,0.05); }
    .upload-dropzone.has-file { border-color: var(--success); background: rgba(40,200,64,0.05); }
    .upload-dropzone .dz-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .upload-dropzone .dz-text { font-weight: 500; margin-bottom: 0.3rem; }
    .upload-dropzone .dz-hint { font-size: 0.8rem; color: var(--text-dim); }
    .upload-dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .upload-preview { display: none; margin-bottom: 1.5rem; }
    .upload-preview.visible { display: block; }
    .upload-preview img { width: 100%; max-height: 160px; object-fit: contain; border-radius: 12px; background: rgba(255,255,255,0.03); }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-label { font-size: 0.75rem; color: var(--text-dim); }

    .form-input, .form-select {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
    }

    .form-input:focus, .form-select:focus { border-color: var(--primary); }
    .form-select option { background: var(--dark); }

    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    .btn-primary:hover { background: var(--primary-hover); }

    /* ===== LOADING ===== */
    .loading-screen {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
    }

    .loading-spinner {
      width: 60px; height: 60px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 1.1rem; font-weight: 500; }
    .loading-sub { font-size: 0.85rem; color: var(--text-dim); }

    .loading-progress { width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
    .loading-progress-bar { height: 100%; background: var(--primary); border-radius: 4px; width: 0%; transition: width 0.3s; }

    /* ===== 3D VIEWER ===== */
    #viewer-screen { position: relative; }
    #viewer-screen.active { display: block; }

    #three-canvas { width: 100%; height: 100vh; display: block; }

    /* Click to start overlay */
    .click-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      z-index: 200;
      cursor: pointer;
    }

    .click-overlay.hidden { display: none; }

    .click-overlay-icon { font-size: 3rem; }
    .click-overlay-text { font-size: 1.2rem; font-weight: 700; }
    .click-overlay-hint { font-size: 0.85rem; color: var(--text-dim); }

    /* HUD */
    .hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
    }

    .hud > * { pointer-events: auto; }

    .hud-logo {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      opacity: 0.8;
    }

    .hud-info {
      font-size: 0.8rem;
      color: var(--text-dim);
      background: rgba(0,0,0,0.4);
      padding: 0.4rem 1rem;
      border-radius: 50px;
    }

    .hud-controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 100;
    }

    .hud-btn {
      padding: 0.5rem 1rem;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .hud-btn:hover { background: rgba(45,91,255,0.4); border-color: var(--primary); }
    .hud-btn.active { background: var(--primary); border-color: var(--primary); }

    /* Placement mode banner */
    .place-banner {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(45,91,255,0.9);
      padding: 0.6rem 1.5rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 200;
      display: none;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .place-banner.show { display: block; }
    .place-banner .banner-sub { font-size: 0.7rem; font-weight: 400; opacity: 0.7; margin-top: 0.2rem; }

    /* Selected furniture indicator */
    .select-banner {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,107,53,0.9);
      padding: 0.6rem 1.5rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 200;
      display: none;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .select-banner.show { display: block; }
    .select-banner .banner-btns { display: flex; gap: 0.5rem; margin-top: 0.4rem; justify-content: center; }
    .select-banner .banner-btn {
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .select-banner .btn-move { background: rgba(255,255,255,0.2); color: white; }
    .select-banner .btn-rotate { background: rgba(255,255,255,0.2); color: white; }
    .select-banner .btn-delete { background: rgba(255,80,80,0.4); color: #ffcccc; }

    /* Crosshair */
    .crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      z-index: 150;
      pointer-events: none;
    }

    .crosshair::before, .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.4);
    }

    .crosshair::before { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }
    .crosshair::after { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }

    /* Key hints */
    .key-hints {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1.5rem;
      z-index: 100;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .key-hint { display: flex; align-items: center; gap: 0.3rem; }

    .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0 4px;
    }

    /* Furniture sidebar */
    .furniture-sidebar {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 300px;
      background: rgba(20,20,40,0.95);
      border-left: 1px solid var(--card-border);
      z-index: 180;
      transform: translateX(100%);
      transition: transform 0.3s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(20px);
    }

    .furniture-sidebar.open { transform: translateX(0); }

    .sidebar-header {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
    }

    .sidebar-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .sidebar-cats {
      display: flex;
      gap: 0.3rem;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--card-border);
    }

    .sidebar-cat {
      padding: 0.3rem 0.7rem;
      border-radius: 50px;
      font-size: 0.7rem;
      background: rgba(255,255,255,0.05);
      color: var(--text-dim);
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .sidebar-cat.active { background: var(--primary); color: white; }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      align-content: start;
    }

    .furn-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 0.8rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .furn-card:hover { border-color: var(--primary); }
    .furn-card.placed { border-color: var(--success); background: rgba(40,200,64,0.08); }
    .furn-card .fc-icon { font-size: 1.8rem; margin-bottom: 0.3rem; }
    .furn-card .fc-name { font-size: 0.75rem; margin-bottom: 0.2rem; }
    .furn-card .fc-size { font-size: 0.6rem; color: var(--text-dim); margin-bottom: 0.4rem; }

    .furn-card .fc-btn {
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      font-size: 0.65rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: inherit;
      background: var(--primary);
      color: white;
    }

    .furn-card.placed .fc-btn { background: rgba(255,100,100,0.2); color: #ff6b6b; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-size: 0.85rem;
      z-index: 1000;
      transition: transform 0.3s, opacity 0.3s;
      opacity: 0;
      backdrop-filter: blur(10px);
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Minimap */
    .minimap {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 150px;
      height: 120px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      z-index: 100;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .minimap canvas { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <!-- SCREEN 1: UPLOAD -->
  <div class="screen upload-screen active" id="screen-upload">
    <div class="upload-container">
      <div class="upload-logo">ROOMCRAFT</div>
      <p class="upload-tagline">間取り図から、歩ける部屋へ。</p>

      <div class="upload-dropzone" id="dropzone">
        <div class="dz-icon" id="dz-icon">📁</div>
        <p class="dz-text" id="dz-text">間取り図をドラッグ&ドロップ</p>
        <p class="dz-hint" id="dz-hint">PDF, PNG, JPG 対応</p>
        <input type="file" accept="image/*,.pdf" id="file-input">
      </div>

      <div class="upload-preview" id="upload-preview">
        <img id="preview-img" src="" alt="">
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">間取り</label>
          <select class="form-select" id="input-layout">
            <option value="1R">1R</option>
            <option value="1K">1K</option>
            <option value="1LDK">1LDK</option>
            <option value="2LDK" selected>2LDK</option>
            <option value="3LDK">3LDK</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">面積（m²）</label>
          <input type="number" class="form-input" value="65" id="input-area">
        </div>
        <div class="form-group">
          <label class="form-label">天井高（m）</label>
          <input type="number" class="form-input" value="2.5" step="0.1" id="input-height">
        </div>
        <div class="form-group">
          <label class="form-label">階数</label>
          <input type="number" class="form-input" value="3" id="input-floor">
        </div>
      </div>

      <button class="btn-primary" onclick="startGenerate()">3D空間を生成する</button>
    </div>
  </div>

  <!-- LOADING -->
  <div class="screen loading-screen" id="screen-loading">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">図面を解析中...</div>
    <div class="loading-sub" id="loading-sub">AIが間取り図を読み取っています</div>
    <div class="loading-progress"><div class="loading-progress-bar" id="loading-bar"></div></div>
  </div>

  <!-- 3D VIEWER -->
  <div class="screen" id="viewer-screen">
    <canvas id="three-canvas"></canvas>

    <!-- Click to start -->
    <div class="click-overlay" id="click-overlay">
      <div class="click-overlay-icon">🏠</div>
      <div class="click-overlay-text">クリックして内見を開始</div>
      <div class="click-overlay-hint">マウスで視点操作 / WASD で移動</div>
    </div>

    <!-- Crosshair -->
    <div class="crosshair" id="crosshair" style="display:none;"></div>

    <!-- HUD -->
    <div class="hud" id="hud">
      <div class="hud-logo">ROOMCRAFT</div>
      <div class="hud-info" id="hud-info">2LDK / 65m²</div>
    </div>

    <!-- Key hints -->
    <div class="key-hints" id="key-hints">
      <div class="key-hint"><span class="key">W</span>前進</div>
      <div class="key-hint"><span class="key">S</span>後退</div>
      <div class="key-hint"><span class="key">A</span>左</div>
      <div class="key-hint"><span class="key">D</span>右</div>
      <div class="key-hint"><span class="key">R</span>回転</div>
      <div class="key-hint"><span class="key">ESC</span>メニュー</div>
    </div>

    <!-- Placement mode banner -->
    <div class="place-banner" id="place-banner">
      <div id="place-banner-text">ソファ を配置中...</div>
      <div class="banner-sub">クリックで設置 / R で回転 / ESC でキャンセル</div>
    </div>

    <!-- Selected furniture banner -->
    <div class="select-banner" id="select-banner">
      <div id="select-banner-text">ソファ を選択中</div>
      <div class="banner-btns">
        <button class="banner-btn btn-move" onclick="window.startMoving()">📍 移動</button>
        <button class="banner-btn btn-rotate" onclick="window.rotateSelected()">🔄 回転</button>
        <button class="banner-btn btn-delete" onclick="window.deleteSelected()">🗑️ 削除</button>
      </div>
    </div>

    <!-- Bottom controls -->
    <div class="hud-controls">
      <button class="hud-btn" onclick="toggleFurnitureSidebar()">🛋️ 家具を配置</button>
      <button class="hud-btn" onclick="resetPosition()">📍 入口に戻る</button>
      <button class="hud-btn" onclick="toggleMinimap()">🗺️ マップ</button>
    </div>

    <!-- Minimap -->
    <div class="minimap" id="minimap">
      <canvas id="minimap-canvas"></canvas>
    </div>

    <!-- Furniture sidebar -->
    <div class="furniture-sidebar" id="furniture-sidebar">
      <div class="sidebar-header">
        家具プリセット
        <button class="sidebar-close" onclick="toggleFurnitureSidebar()">&#10005;</button>
      </div>
      <div class="sidebar-cats" id="sidebar-cats"></div>
      <div class="sidebar-list" id="sidebar-list"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // ===== CONFIG =====
    const ROOM = {
      // 2LDK layout: LDK + Bedroom1 + Bedroom2
      walls: [],
      eyeHeight: 1.6,
      ceilingHeight: 2.5,
    };

    // ===== FURNITURE DATA =====
    const furnitureData = [
      { id:'sofa',    icon:'🛋️', name:'3人掛けソファ',    size:'W180×D85',  cat:'living',  w:1.8, d:0.85, h:0.75, color:0x4466aa },
      { id:'tv',      icon:'📺', name:'TVボード',         size:'W150×D40',  cat:'living',  w:1.5, d:0.4,  h:0.5,  color:0x3a3a3a },
      { id:'ctable',  icon:'🪵', name:'ローテーブル',     size:'W100×D50',  cat:'living',  w:1.0, d:0.5,  h:0.35, color:0x8B6914 },
      { id:'bed',     icon:'🛏️', name:'ダブルベッド',     size:'W140×D200', cat:'bedroom', w:1.4, d:2.0,  h:0.45, color:0xccccdd },
      { id:'desk',    icon:'🖥️', name:'デスク',           size:'W120×D60',  cat:'bedroom', w:1.2, d:0.6,  h:0.72, color:0x8B6914 },
      { id:'dining',  icon:'🪑', name:'ダイニングセット', size:'W120×D80',  cat:'dining',  w:1.2, d:0.8,  h:0.75, color:0x8B5E3C },
      { id:'shelf',   icon:'📚', name:'本棚',             size:'W80×D30',   cat:'other',   w:0.8, d:0.3,  h:1.8,  color:0x6B4226 },
      { id:'fridge',  icon:'🧊', name:'冷蔵庫',           size:'W60×D65',   cat:'other',   w:0.6, d:0.65, h:1.7,  color:0xdddde0 },
      { id:'washer',  icon:'🫧', name:'洗濯機',           size:'W60×D55',   cat:'other',   w:0.6, d:0.55, h:0.9,  color:0xdddddd },
    ];

    const placed = {};       // id -> { mesh, data }
    let currentCat = 'all';

    // ===== THREE.JS SETUP =====
    let scene, camera, renderer, controls;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    let isLocked = false;

    // Placement mode
    let placingFurniture = null;  // furniture data being placed
    let ghostMesh = null;         // preview mesh
    let ghostRotation = 0;        // current rotation of ghost

    // Selection mode
    let selectedMesh = null;      // currently selected placed furniture
    let selectedId = null;
    let movingMode = false;       // moving a selected furniture

    // Raycaster
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2(0, 0); // center of screen
    let floorMeshes = [];  // floor planes for raycasting

    // Minimap
    let minimapCtx;

    function init() {
      const canvas = document.getElementById('three-canvas');

      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87CEEB);
      scene.fog = new THREE.Fog(0x87CEEB, 15, 30);

      // Camera
      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, ROOM.eyeHeight, 4);

      // Renderer
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;

      // Controls
      controls = new PointerLockControls(camera, document.body);

      const overlay = document.getElementById('click-overlay');
      overlay.addEventListener('click', () => { controls.lock(); });

      controls.addEventListener('lock', () => {
        overlay.classList.add('hidden');
        document.getElementById('crosshair').style.display = 'block';
        isLocked = true;
      });

      controls.addEventListener('unlock', () => {
        const sidebarOpen = document.getElementById('furniture-sidebar').classList.contains('open');
        const selectOpen = document.getElementById('select-banner').classList.contains('show');
        if (!sidebarOpen && !selectOpen) {
          overlay.classList.remove('hidden');
        }
        document.getElementById('crosshair').style.display = 'none';
        isLocked = false;

        // Cancel placement on unlock (ESC)
        if (placingFurniture) {
          cancelPlacing();
        }
      });

      // Lighting
      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);

      const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
      sunLight.position.set(5, 8, 3);
      sunLight.castShadow = true;
      sunLight.shadow.mapSize.set(2048, 2048);
      sunLight.shadow.camera.near = 0.5;
      sunLight.shadow.camera.far = 25;
      sunLight.shadow.camera.left = -10;
      sunLight.shadow.camera.right = 10;
      sunLight.shadow.camera.top = 10;
      sunLight.shadow.camera.bottom = -10;
      scene.add(sunLight);

      // Fill light from window side
      const fillLight = new THREE.DirectionalLight(0xaaccff, 0.3);
      fillLight.position.set(-3, 4, -2);
      scene.add(fillLight);

      // Build room
      buildRoom();

      // Click handler for placing/selecting furniture
      document.addEventListener('click', onCanvasClick);

      // Keyboard
      document.addEventListener('keydown', onKeyDown);
      document.addEventListener('keyup', onKeyUp);

      // Resize
      window.addEventListener('resize', onResize);

      // Minimap
      const mmCanvas = document.getElementById('minimap-canvas');
      mmCanvas.width = 150;
      mmCanvas.height = 120;
      minimapCtx = mmCanvas.getContext('2d');

      // Render furniture sidebar
      renderSidebar();

      animate();
    }

    // ===== BUILD ROOM =====
    function buildRoom() {
      const textureLoader = new THREE.TextureLoader();

      // Materials
      const floorMat = new THREE.MeshStandardMaterial({
        color: 0xC4A776,
        roughness: 0.8,
        metalness: 0.0,
      });

      // Create wood grain pattern on floor
      const floorCanvas = document.createElement('canvas');
      floorCanvas.width = 512;
      floorCanvas.height = 512;
      const fctx = floorCanvas.getContext('2d');
      // Wood base
      fctx.fillStyle = '#C4A776';
      fctx.fillRect(0, 0, 512, 512);
      // Planks
      for (let i = 0; i < 8; i++) {
        const y = i * 64;
        fctx.strokeStyle = 'rgba(0,0,0,0.08)';
        fctx.lineWidth = 2;
        fctx.beginPath();
        fctx.moveTo(0, y);
        fctx.lineTo(512, y);
        fctx.stroke();
        // Wood grain
        for (let j = 0; j < 20; j++) {
          fctx.strokeStyle = `rgba(139,105,40,${Math.random()*0.06})`;
          fctx.lineWidth = 1;
          fctx.beginPath();
          fctx.moveTo(0, y + Math.random() * 60);
          fctx.bezierCurveTo(170, y + Math.random()*60, 340, y + Math.random()*60, 512, y + Math.random()*60);
          fctx.stroke();
        }
      }
      const floorTex = new THREE.CanvasTexture(floorCanvas);
      floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
      floorTex.repeat.set(4, 3);
      floorMat.map = floorTex;

      const wallMat = new THREE.MeshStandardMaterial({ color: 0xF5F0E8, roughness: 0.9 });
      const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xFAFAFA, roughness: 0.9 });
      const accentWallMat = new THREE.MeshStandardMaterial({ color: 0xE8E0D0, roughness: 0.9 });

      // 2LDK Layout
      // LDK: 8m x 5m (main room)
      // Bedroom: 4m x 4m (right side)
      // Bedroom2: 4m x 3m (far right)
      // Hallway connecting

      const ch = ROOM.ceilingHeight;

      // === LDK (main room) ===
      // Floor
      const ldkFloor = new THREE.Mesh(new THREE.PlaneGeometry(8, 5), floorMat);
      ldkFloor.rotation.x = -Math.PI / 2;
      ldkFloor.position.set(0, 0, 0);
      ldkFloor.receiveShadow = true;
      ldkFloor.name = 'floor';
      scene.add(ldkFloor);
      floorMeshes.push(ldkFloor);

      // Ceiling
      const ldkCeiling = new THREE.Mesh(new THREE.PlaneGeometry(8, 5), ceilingMat);
      ldkCeiling.rotation.x = Math.PI / 2;
      ldkCeiling.position.set(0, ch, 0);
      scene.add(ldkCeiling);

      // Back wall (with window)
      createWall(0, ch/2, -2.5, 8, ch, 0, wallMat, true);

      // Front wall (with door opening)
      createWall(-2.5, ch/2, 2.5, 3, ch, 0, wallMat); // left portion
      createWall(2.5, ch/2, 2.5, 3, ch, 0, wallMat);  // right portion
      // Door frame above
      createWall(0, ch - 0.3, 2.5, 2, 0.6, 0, wallMat);

      // Left wall
      createWall(-4, ch/2, 0, 5, ch, Math.PI/2, accentWallMat);

      // Right wall (partial - opening to bedroom)
      createWall(4, ch/2, -0.75, 2, ch, Math.PI/2, wallMat);
      createWall(4, ch/2, 2, 1, ch, Math.PI/2, wallMat);
      // Above opening
      createWall(4, ch - 0.3, 0.75, 1.5, 0.6, Math.PI/2, wallMat);

      // === Bedroom ===
      const brFloor = new THREE.Mesh(new THREE.PlaneGeometry(4, 4), floorMat.clone());
      brFloor.rotation.x = -Math.PI / 2;
      brFloor.position.set(6, 0, -0.5);
      brFloor.receiveShadow = true;
      brFloor.name = 'floor';
      scene.add(brFloor);
      floorMeshes.push(brFloor);

      const brCeiling = new THREE.Mesh(new THREE.PlaneGeometry(4, 4), ceilingMat);
      brCeiling.rotation.x = Math.PI / 2;
      brCeiling.position.set(6, ch, -0.5);
      scene.add(brCeiling);

      // Bedroom walls
      createWall(6, ch/2, -2.5, 4, ch, 0, wallMat, true); // back (window)
      createWall(6, ch/2, 1.5, 4, ch, 0, wallMat);         // front
      createWall(8, ch/2, -0.5, 4, ch, Math.PI/2, accentWallMat); // right

      // === Kitchen counter in LDK ===
      const counter = new THREE.Mesh(
        new THREE.BoxGeometry(2.5, 0.9, 0.6),
        new THREE.MeshStandardMaterial({ color: 0xEEEEEE, roughness: 0.3, metalness: 0.1 })
      );
      counter.position.set(-2.5, 0.45, -1.8);
      counter.castShadow = true;
      counter.receiveShadow = true;
      scene.add(counter);

      // Counter top (darker)
      const counterTop = new THREE.Mesh(
        new THREE.BoxGeometry(2.6, 0.04, 0.65),
        new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.2, metalness: 0.3 })
      );
      counterTop.position.set(-2.5, 0.92, -1.8);
      scene.add(counterTop);

      // Sink
      const sink = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.02, 0.35),
        new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.1, metalness: 0.8 })
      );
      sink.position.set(-2.2, 0.93, -1.8);
      scene.add(sink);

      // === Baseboard along walls ===
      const bbMat = new THREE.MeshStandardMaterial({ color: 0xDDDDD5, roughness: 0.7 });
      // Back wall baseboard
      const bb1 = new THREE.Mesh(new THREE.BoxGeometry(8, 0.08, 0.02), bbMat);
      bb1.position.set(0, 0.04, -2.49);
      scene.add(bb1);

      // === Outdoor ground ===
      const groundGeo = new THREE.PlaneGeometry(50, 50);
      const groundMat = new THREE.MeshStandardMaterial({ color: 0x7CB68E, roughness: 1 });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.01;
      ground.receiveShadow = true;
      scene.add(ground);

      // Window light shafts
      const windowLight = new THREE.SpotLight(0xFFF8E7, 0.8, 10, Math.PI / 4);
      windowLight.position.set(0, ch, -2.5);
      windowLight.target.position.set(0, 0, 0);
      scene.add(windowLight);
      scene.add(windowLight.target);
    }

    function createWall(x, y, z, width, height, rotY, material, hasWindow = false) {
      if (hasWindow) {
        // Wall with window - create 3 parts
        const winW = 2.0, winH = 1.2;
        const winY = 1.0;

        // Left part
        const leftW = (width - winW) / 2;
        const left = new THREE.Mesh(new THREE.BoxGeometry(leftW, height, 0.12), material);
        left.position.set(x - width/2 + leftW/2, y, z);
        left.rotation.y = rotY;
        left.castShadow = true;
        scene.add(left);

        // Right part
        const right = new THREE.Mesh(new THREE.BoxGeometry(leftW, height, 0.12), material);
        right.position.set(x + width/2 - leftW/2, y, z);
        right.rotation.y = rotY;
        right.castShadow = true;
        scene.add(right);

        // Above window
        const aboveH = height - winY - winH;
        if (aboveH > 0) {
          const above = new THREE.Mesh(new THREE.BoxGeometry(winW, aboveH, 0.12), material);
          above.position.set(x, y + height/2 - aboveH/2, z);
          above.rotation.y = rotY;
          scene.add(above);
        }

        // Below window
        const below = new THREE.Mesh(new THREE.BoxGeometry(winW, winY, 0.12), material);
        below.position.set(x, winY/2, z);
        below.rotation.y = rotY;
        scene.add(below);

        // Window glass
        const glass = new THREE.Mesh(
          new THREE.PlaneGeometry(winW, winH),
          new THREE.MeshStandardMaterial({
            color: 0x88BBEE,
            transparent: true,
            opacity: 0.3,
            roughness: 0,
            metalness: 0.5,
            side: THREE.DoubleSide,
          })
        );
        glass.position.set(x, winY + winH/2, z);
        glass.rotation.y = rotY;
        scene.add(glass);

        // Window frame
        const frameMat = new THREE.MeshStandardMaterial({ color: 0xEEEEEE, roughness: 0.3 });
        // Top
        const ft = new THREE.Mesh(new THREE.BoxGeometry(winW + 0.08, 0.04, 0.14), frameMat);
        ft.position.set(x, winY + winH, z);
        ft.rotation.y = rotY;
        scene.add(ft);
        // Bottom (windowsill)
        const fb = new THREE.Mesh(new THREE.BoxGeometry(winW + 0.1, 0.04, 0.2), frameMat);
        fb.position.set(x, winY, z);
        fb.rotation.y = rotY;
        scene.add(fb);
        // Vertical divider
        const fv = new THREE.Mesh(new THREE.BoxGeometry(0.03, winH, 0.05), frameMat);
        fv.position.set(x, winY + winH/2, z);
        fv.rotation.y = rotY;
        scene.add(fv);

      } else {
        const wall = new THREE.Mesh(new THREE.BoxGeometry(width, height, 0.12), material);
        wall.position.set(x, y, z);
        wall.rotation.y = rotY;
        wall.castShadow = true;
        wall.receiveShadow = true;
        scene.add(wall);
      }
    }

    // ===== RAYCASTING HELPERS =====
    function getFloorIntersection() {
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(floorMeshes);
      return hits.length > 0 ? hits[0].point : null;
    }

    function getFurnitureIntersection() {
      raycaster.setFromCamera(pointer, camera);
      const furnMeshes = Object.values(placed).map(p => p.mesh);
      const hits = raycaster.intersectObjects(furnMeshes);
      return hits.length > 0 ? hits[0].object : null;
    }

    // ===== PLACEMENT MODE =====
    function startPlacing(f) {
      // Cancel any current placement/selection
      cancelPlacing();
      deselectFurniture();

      placingFurniture = f;
      ghostRotation = 0;

      // Create ghost (semi-transparent preview)
      const geo = new THREE.BoxGeometry(f.w, f.h, f.d);
      const mat = new THREE.MeshStandardMaterial({
        color: f.color,
        transparent: true,
        opacity: 0.5,
        roughness: 0.6,
      });
      ghostMesh = new THREE.Mesh(geo, mat);
      ghostMesh.castShadow = false;
      ghostMesh.position.set(camera.position.x, f.h / 2, camera.position.z - 2);
      scene.add(ghostMesh);

      // Show banner
      document.getElementById('place-banner-text').textContent = `${f.icon} ${f.name} を配置中...`;
      document.getElementById('place-banner').classList.add('show');

      // Close sidebar and lock controls
      document.getElementById('furniture-sidebar').classList.remove('open');
      setTimeout(() => controls.lock(), 100);
    }

    function confirmPlacing() {
      if (!placingFurniture || !ghostMesh) return;

      const f = placingFurniture;

      // Create real mesh at ghost position
      const geo = new THREE.BoxGeometry(f.w, f.h, f.d);
      const mat = new THREE.MeshStandardMaterial({
        color: f.color,
        roughness: 0.6,
        metalness: 0.05,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.copy(ghostMesh.position);
      mesh.rotation.copy(ghostMesh.rotation);
      mesh.name = 'furniture_' + f.id;
      scene.add(mesh);

      placed[f.id] = { mesh, data: f };

      // Clean up ghost
      scene.remove(ghostMesh);
      ghostMesh.geometry.dispose();
      ghostMesh.material.dispose();
      ghostMesh = null;
      placingFurniture = null;

      document.getElementById('place-banner').classList.remove('show');
      showToast(`${f.icon} ${f.name} を配置しました`);
      renderFurnitureList();
    }

    function cancelPlacing() {
      if (ghostMesh) {
        scene.remove(ghostMesh);
        ghostMesh.geometry.dispose();
        ghostMesh.material.dispose();
        ghostMesh = null;
      }
      placingFurniture = null;
      movingMode = false;
      document.getElementById('place-banner').classList.remove('show');
    }

    // ===== SELECTION MODE =====
    function selectFurniture(mesh) {
      deselectFurniture();

      selectedMesh = mesh;
      // Find which furniture this is
      for (const [id, entry] of Object.entries(placed)) {
        if (entry.mesh === mesh) {
          selectedId = id;
          break;
        }
      }

      // Highlight
      selectedMesh.material.emissive = new THREE.Color(0xFF6B35);
      selectedMesh.material.emissiveIntensity = 0.3;

      const f = placed[selectedId].data;
      document.getElementById('select-banner-text').textContent = `${f.icon} ${f.name} を選択中`;
      document.getElementById('select-banner').classList.add('show');
    }

    function deselectFurniture() {
      if (selectedMesh) {
        selectedMesh.material.emissive = new THREE.Color(0x000000);
        selectedMesh.material.emissiveIntensity = 0;
        selectedMesh = null;
        selectedId = null;
      }
      movingMode = false;
      document.getElementById('select-banner').classList.remove('show');
    }

    window.startMoving = () => {
      if (!selectedMesh || !selectedId) return;
      const entry = placed[selectedId];

      // Switch to placement mode with this furniture
      movingMode = true;
      placingFurniture = entry.data;
      ghostRotation = entry.mesh.rotation.y;

      // Turn current mesh into ghost
      const geo = new THREE.BoxGeometry(entry.data.w, entry.data.h, entry.data.d);
      const mat = new THREE.MeshStandardMaterial({
        color: entry.data.color,
        transparent: true,
        opacity: 0.5,
        roughness: 0.6,
      });
      ghostMesh = new THREE.Mesh(geo, mat);
      ghostMesh.position.copy(entry.mesh.position);
      ghostMesh.rotation.copy(entry.mesh.rotation);
      scene.add(ghostMesh);

      // Remove original
      scene.remove(entry.mesh);
      entry.mesh.geometry.dispose();
      entry.mesh.material.dispose();
      delete placed[selectedId];

      deselectFurniture();

      document.getElementById('place-banner-text').textContent = `${placingFurniture.icon} ${placingFurniture.name} を移動中...`;
      document.getElementById('place-banner').classList.add('show');

      setTimeout(() => controls.lock(), 100);
      renderFurnitureList();
    };

    window.rotateSelected = () => {
      if (selectedMesh) {
        selectedMesh.rotation.y += Math.PI / 4;
        showToast('45° 回転しました');
      }
    };

    window.deleteSelected = () => {
      if (selectedId && placed[selectedId]) {
        const f = placed[selectedId].data;
        scene.remove(placed[selectedId].mesh);
        placed[selectedId].mesh.geometry.dispose();
        placed[selectedId].mesh.material.dispose();
        delete placed[selectedId];
        deselectFurniture();
        showToast(`${f.icon} ${f.name} を撤去しました`);
        renderFurnitureList();
      }
    };

    // ===== CLICK HANDLER =====
    function onCanvasClick(e) {
      if (!isLocked) return;

      // Placing mode: confirm placement
      if (placingFurniture && ghostMesh) {
        confirmPlacing();
        return;
      }

      // Not placing: try to select furniture
      const hitMesh = getFurnitureIntersection();
      if (hitMesh) {
        selectFurniture(hitMesh);
        controls.unlock();
      } else {
        deselectFurniture();
      }
    }

    // ===== PLACE FURNITURE (from sidebar button) =====
    function placeFurniture3D(f) {
      startPlacing(f);
    }

    function removeFurniture3D(id) {
      if (placed[id]) {
        scene.remove(placed[id].mesh);
        placed[id].mesh.geometry.dispose();
        placed[id].mesh.material.dispose();
        delete placed[id];
      }
    }

    // ===== SIDEBAR =====
    function renderSidebar() {
      const cats = document.getElementById('sidebar-cats');
      const categories = [
        { id: 'all', label: 'すべて' },
        { id: 'living', label: 'リビング' },
        { id: 'bedroom', label: '寝室' },
        { id: 'dining', label: 'ダイニング' },
        { id: 'other', label: 'その他' },
      ];

      cats.innerHTML = categories.map(c =>
        `<button class="sidebar-cat ${c.id === currentCat ? 'active' : ''}" onclick="window.filterCat('${c.id}', this)">${c.label}</button>`
      ).join('');

      renderFurnitureList();
    }

    function renderFurnitureList() {
      const list = document.getElementById('sidebar-list');
      const filtered = currentCat === 'all' ? furnitureData : furnitureData.filter(f => f.cat === currentCat);

      list.innerHTML = filtered.map(f => `
        <div class="furn-card ${placed[f.id] ? 'placed' : ''}">
          <div class="fc-icon">${f.icon}</div>
          <div class="fc-name">${f.name}</div>
          <div class="fc-size">${f.size}</div>
          <button class="fc-btn" onclick="window.toggleFurniture('${f.id}')">${placed[f.id] ? '撤去' : '配置'}</button>
        </div>
      `).join('');

      // Also update sidebar cats active state
      document.querySelectorAll('.sidebar-cat').forEach(b => {
        b.classList.toggle('active', b.textContent === (
          currentCat === 'all' ? 'すべて' :
          currentCat === 'living' ? 'リビング' :
          currentCat === 'bedroom' ? '寝室' :
          currentCat === 'dining' ? 'ダイニング' : 'その他'
        ));
      });
    }

    window.filterCat = (cat, btn) => {
      currentCat = cat;
      renderSidebar();
    };

    window.toggleFurniture = (id) => {
      const f = furnitureData.find(d => d.id === id);
      if (placed[id]) {
        removeFurniture3D(id);
        showToast(`${f.icon} ${f.name} を撤去しました`);
        renderFurnitureList();
      } else {
        // Enter placement mode
        startPlacing(f);
      }
    };

    window.toggleFurnitureSidebar = () => {
      const sb = document.getElementById('furniture-sidebar');
      const isOpen = sb.classList.toggle('open');
      if (isOpen && isLocked) controls.unlock();
    };

    window.resetPosition = () => {
      camera.position.set(0, ROOM.eyeHeight, 4);
      camera.rotation.set(0, 0, 0);
      showToast('入口に戻りました');
    };

    window.toggleMinimap = () => {
      const mm = document.getElementById('minimap');
      mm.style.display = mm.style.display === 'none' ? 'block' : 'none';
    };

    // ===== MOVEMENT =====
    function onKeyDown(e) {
      switch (e.code) {
        case 'KeyW': case 'ArrowUp': moveForward = true; break;
        case 'KeyS': case 'ArrowDown': moveBackward = true; break;
        case 'KeyA': case 'ArrowLeft': moveLeft = true; break;
        case 'KeyD': case 'ArrowRight': moveRight = true; break;
        case 'KeyR':
          // Rotate ghost or selected
          if (placingFurniture && ghostMesh) {
            ghostRotation += Math.PI / 4;
            ghostMesh.rotation.y = ghostRotation;
            showToast('45° 回転');
          } else if (selectedMesh) {
            window.rotateSelected();
          }
          break;
        case 'Escape':
          if (placingFurniture) {
            cancelPlacing();
            showToast('配置をキャンセルしました');
          } else if (selectedMesh) {
            deselectFurniture();
          }
          break;
      }
    }

    function onKeyUp(e) {
      switch (e.code) {
        case 'KeyW': case 'ArrowUp': moveForward = false; break;
        case 'KeyS': case 'ArrowDown': moveBackward = false; break;
        case 'KeyA': case 'ArrowLeft': moveLeft = false; break;
        case 'KeyD': case 'ArrowRight': moveRight = false; break;
      }
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ===== MINIMAP =====
    function drawMinimap() {
      const ctx = minimapCtx;
      if (!ctx) return;

      ctx.fillStyle = '#111122';
      ctx.fillRect(0, 0, 150, 120);

      const scale = 10;
      const ox = 35, oy = 65;

      // LDK
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(ox - 40, oy - 25, 80, 50);

      // Bedroom
      ctx.strokeRect(ox + 40, oy - 25, 40, 40);

      // Labels
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '8px sans-serif';
      ctx.fillText('LDK', ox - 15, oy + 3);
      ctx.fillText('BR', ox + 52, oy - 5);

      // Placed furniture on minimap
      ctx.fillStyle = 'rgba(45,91,255,0.4)';
      for (const [id, entry] of Object.entries(placed)) {
        const fx = ox + entry.mesh.position.x * scale;
        const fz = oy + entry.mesh.position.z * scale;
        const fw = entry.data.w * scale;
        const fd = entry.data.d * scale;
        ctx.fillRect(fx - fw/2, fz - fd/2, fw, fd);
      }

      // Player position
      const px = ox + camera.position.x * scale;
      const pz = oy + camera.position.z * scale;
      ctx.fillStyle = '#FF6B35';
      ctx.beginPath();
      ctx.arc(px, pz, 3, 0, Math.PI * 2);
      ctx.fill();

      // Direction
      const dir = new THREE.Vector3(0, 0, -1);
      dir.applyQuaternion(camera.quaternion);
      ctx.strokeStyle = '#FF6B35';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(px, pz);
      ctx.lineTo(px + dir.x * 8, pz + dir.z * 8);
      ctx.stroke();
    }

    // ===== ANIMATION LOOP =====
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (controls.isLocked) {
        const speed = 4.0;

        velocity.x -= velocity.x * 8.0 * delta;
        velocity.z -= velocity.z * 8.0 * delta;

        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
        if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

        controls.moveRight(-velocity.x * delta * 20);
        controls.moveForward(-velocity.z * delta * 20);

        // Keep at eye height
        camera.position.y = ROOM.eyeHeight;

        // Simple boundary clamping
        camera.position.x = Math.max(-3.8, Math.min(7.8, camera.position.x));
        camera.position.z = Math.max(-2.3, Math.min(2.3, camera.position.z));
      }

      // Update ghost position (follows where player looks on the floor)
      if (placingFurniture && ghostMesh && controls.isLocked) {
        const floorPoint = getFloorIntersection();
        if (floorPoint) {
          ghostMesh.position.x = floorPoint.x;
          ghostMesh.position.z = floorPoint.z;
          ghostMesh.position.y = placingFurniture.h / 2;
        }
      }

      drawMinimap();
      renderer.render(scene, camera);
    }

    // ===== SCREEN MANAGEMENT =====
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    window.startGenerate = () => {
      showScreen('screen-loading');

      const messages = [
        { text: '図面を解析中...', sub: 'AIが間取り図を読み取っています', pct: 15 },
        { text: '壁・窓を検出中...', sub: '部屋の構造を認識しています', pct: 35 },
        { text: '3Dモデルを構築中...', sub: '空間を3次元に変換しています', pct: 60 },
        { text: 'テクスチャを適用中...', sub: '床材・壁紙を設定しています', pct: 80 },
        { text: '最終調整中...', sub: 'まもなく完了します', pct: 95 },
      ];

      let i = 0;
      const interval = setInterval(() => {
        if (i < messages.length) {
          document.getElementById('loading-text').textContent = messages[i].text;
          document.getElementById('loading-sub').textContent = messages[i].sub;
          document.getElementById('loading-bar').style.width = messages[i].pct + '%';
          i++;
        } else {
          clearInterval(interval);
          document.getElementById('loading-bar').style.width = '100%';

          const layout = document.getElementById('input-layout').value;
          const area = document.getElementById('input-area').value;
          document.getElementById('hud-info').textContent = `${layout} / ${area}m²`;

          setTimeout(() => {
            showScreen('viewer-screen');
            init();
          }, 500);
        }
      }, 700);
    };

    // ===== FILE UPLOAD =====
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');

    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.borderColor = '#2D5BFF'; });
    dropzone.addEventListener('dragleave', () => { dropzone.style.borderColor = ''; });
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

    function handleFile(file) {
      dropzone.classList.add('has-file');
      document.getElementById('dz-icon').textContent = '✅';
      document.getElementById('dz-text').textContent = file.name;
      document.getElementById('dz-hint').textContent = '選択済み';

      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('preview-img').src = e.target.result;
          document.getElementById('upload-preview').classList.add('visible');
        };
        reader.readAsDataURL(file);
      }
    }

    // ===== TOAST =====
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }
    window.showToast = showToast;
  </script>

</body>
</html>
